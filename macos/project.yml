name: Translator Everywhere

options:
  bundleIdPrefix: com.cdcupt
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
  configs:
    # Debug stays unsigned so headless `swift test` / CI builds keep working
    # (CODE_SIGNING_ALLOWED=NO, no identity required).
    Debug:
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGN_IDENTITY: ""
    # Release is signed with the Developer ID for notarization + distribution.
    Release:
      CODE_SIGNING_ALLOWED: YES
      DEVELOPMENT_TEAM: NK3U2C365Z
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "Developer ID Application"
      ENABLE_HARDENED_RUNTIME: YES

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.2.0"

targets:
  Translator Everywhere:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources
    dependencies:
      - package: KeyboardShortcuts
    # Custom Info.plist (generated by xcodegen) so we can register the
    # `translator-everywhere` URL scheme for the Apple/Google web-auth callbacks.
    # CFBundleURLTypes is an array of dicts and can't be expressed via the flat
    # INFOPLIST_KEY_* build settings, so we supply a real plist here instead of
    # GENERATE_INFOPLIST_FILE.
    info:
      path: Generated/Info.plist
      properties:
        # Menu-bar agent: no Dock icon, no main window on launch.
        LSUIElement: true
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: ""
        # The custom scheme ASWebAuthenticationSession listens for. The backend
        # 302s to translator-everywhere://apple-callback?session=&refresh=&state=
        # after a successful Apple (or Google) web sign-in.
        CFBundleURLTypes:
          - CFBundleURLName: com.cdcupt.translator-everywhere.auth
            CFBundleTypeRole: None
            CFBundleURLSchemes:
              - translator-everywhere
    settings:
      base:
        PRODUCT_NAME: Translator Everywhere
        PRODUCT_BUNDLE_IDENTIFIER: com.cdcupt.translator-everywhere
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        # Real app icon: the Gate-1-approved paper-card 译 squircle, shipped as
        # the AppIcon image set in Sources/Assets.xcassets (compiled into
        # Assets.car + AppIcon.icns by actool). Sources/ already includes the
        # .xcassets, so the catalog is part of the target automatically.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Sign in with Apple uses the WEB flow (ASWebAuthenticationSession), which
        # needs NO native entitlement — but we still ship a (now-empty) entitlements
        # file so Release stays hardened-runtime + manual Developer ID signed.
        CODE_SIGN_ENTITLEMENTS: "Translator Everywhere.entitlements"
      configs:
        # Keep the app target unsigned in Debug so the test host builds headless.
        Debug:
          CODE_SIGNING_ALLOWED: NO

  TranslatorEverywhereTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Tests
    dependencies:
      # Host the app so tests can @testable import its symbols (sets TEST_HOST
      # + BUNDLE_LOADER). KeyboardShortcuts is linked transitively via the host.
      - target: Translator Everywhere
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cdcupt.translator-everywhere.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO

schemes:
  Translator Everywhere:
    build:
      targets:
        Translator Everywhere: all
        TranslatorEverywhereTests: [test]
    test:
      # SwiftData in-memory ModelContainers collide if several exist at once in
      # one process (a new container resets a sibling's context, invalidating its
      # @Model instances). Run the test bundle single-threaded so each store's
      # container is the only one alive at a time.
      parallelizable: false
      targets:
        - TranslatorEverywhereTests
    run:
      config: Debug
