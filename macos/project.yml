name: Translator Everywhere

options:
  bundleIdPrefix: com.cdcupt
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    # Signing comes in a later slice; off for headless scaffold builds.
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGN_IDENTITY: ""
    SWIFT_VERSION: "5.0"

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.2.0"

targets:
  Translator Everywhere:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources
    dependencies:
      - package: KeyboardShortcuts
    settings:
      base:
        PRODUCT_NAME: Translator Everywhere
        PRODUCT_BUNDLE_IDENTIFIER: com.cdcupt.translator-everywhere
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        # Menu-bar agent: no Dock icon, no main window on launch.
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        CODE_SIGNING_ALLOWED: NO

  TranslatorEverywhereTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Tests
    dependencies:
      # Host the app so tests can @testable import its symbols (sets TEST_HOST
      # + BUNDLE_LOADER). KeyboardShortcuts is linked transitively via the host.
      - target: Translator Everywhere
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cdcupt.translator-everywhere.tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO

schemes:
  Translator Everywhere:
    build:
      targets:
        Translator Everywhere: all
        TranslatorEverywhereTests: [test]
    test:
      targets:
        - TranslatorEverywhereTests
    run:
      config: Debug
